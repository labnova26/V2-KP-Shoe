<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <rect width="400" height="320" fill="#f8f8f8"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="295" rx="145" ry="12" fill="#00000015"/>
  
        <!-- Kids shoe - rounder, velcro -->
        <path d="M 58 210 Q 52 168 80 135 Q 122 96 205 92 Q 285 88 328 130 Q 352 162 346 210 Z" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="3"/>
        <!-- Velcro strap -->
