  <!-- Brand label -->
  <rect x="14" y="14" width="60" height="26" rx="13" fill="#CC0000"/>
  <text x="43" y="31" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="white" text-anchor="middle" letter-spacing="1">PUMA</text>
