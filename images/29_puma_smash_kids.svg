        <rect x="258" y="144" width="44" height="30" rx="8" fill="#1E3A5F"/>
        <!-- Velcro texture dots -->
        <circle cx="268" cy="159" r="2.5" fill="#FFFFFF" opacity="0.6"/>
        <circle cx="280" cy="159" r="2.5" fill="#FFFFFF" opacity="0.6"/>
        <circle cx="292" cy="159" r="2.5" fill="#FFFFFF" opacity="0.6"/>
        <!-- Sole -->
        <path d="M 58 210 Q 202 228 346 210 L 344 230 Q 202 246 59 230 Z" fill="#1E3A5F"/>
