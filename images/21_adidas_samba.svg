<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <rect width="400" height="320" fill="#f8f8f8"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="295" rx="145" ry="12" fill="#00000015"/>
  
        <!-- Adidas Samba - low profile, T-toe -->
        <path d="M 55 208 Q 50 168 75 138 Q 115 100 200 97 Q 282 94 325 130 Q 350 160 345 208 Z" fill="#FFFFFF" stroke="#222" stroke-width="3"/>
        <!-- T-toe overlay -->
        <path d="M 295 130 Q 340 160 338 200 Q 310 185 295 165 Z" fill="#222222" opacity="0.7"/>
        <!-- 3 Stripes -->
        <line x1="145" y1="125" x2="175" y2="210" stroke="#222" stroke-width="7" opacity="0.8"/>
        <line x1="170" y1="115" x2="200" y2="205" stroke="#222" stroke-width="7" opacity="0.8"/>
        <line x1="195" y1="110" x2="225" y2="205" stroke="#222" stroke-width="7" opacity="0.8"/>
        <!-- Gum sole -->
        <path d="M 55 208 Q 200 226 345 208 L 344 228 Q 200 244 56 228 Z" fill="#C8960C"/>
        <!-- Laces -->
        <line x1="110" y1="160" x2="278" y2="160" stroke="#555" stroke-width="2.5"/>
        <line x1="108" y1="174" x2="280" y2="174" stroke="#555" stroke-width="2.5"/>
        
  <!-- Brand label -->
  <rect x="14" y="14" width="72" height="26" rx="13" fill="#007BFF"/>
  <text x="50" y="31" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="white" text-anchor="middle" letter-spacing="1">ADIDAS</text>
</svg>